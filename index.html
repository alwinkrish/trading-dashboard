<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY Trading Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📊 NIFTY TRADING DASHBOARD</h1>

    <div class="card">
        <h2>NIFTY</h2>
        <p id="nifty">Loading...</p>
    </div>

    <div class="card">
        <h2>BANK NIFTY</h2>
        <p id="banknifty">Loading...</p>
    </div>

    <div class="card">
        <h2>INDIA VIX</h2>
        <p id="vix">Loading...</p>
    </div>

    <div class="card signal">
        <h2>Market Signal</h2>
        <p id="signal">🟡 WAIT</p>
    </div>

    <div class="card">
        <h2>Support</h2>
        <p id="support">--</p>
    </div>

    <div class="card">
        <h2>Resistance</h2>
        <p id="resistance">--</p>
    </div>

    <div class="card">
        <h2>Last Updated</h2>
        <p id="lastUpdated">--</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
