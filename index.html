<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeVision AI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📈 TradeVision AI</h1>

<div class="card">
    <h2>NIFTY</h2>
    <p id="nifty">Loading...</p>
</div>

<div class="card">
    <h2>BANK NIFTY</h2>
    <p id="banknifty">Loading...</p>
</div>

<div class="card">
    <h2>INDIA VIX</h2>
    <p id="vix">Loading...</p>
</div>

<div class="card signal">
    <h2>Market Signal</h2>
    <p id="signal">🟡 WAIT</p>
</div>

<div class="card">
    <h2>Support</h2>
    <p id="support">--</p>
</div>

<div class="card">
    <h2>Resistance</h2>
    <p id="resistance">--</p>
</div>

<div class="card">
    <h2>📊 Highest Call OI</h2>
    <p id="calloi">Coming Soon</p>
</div>

<div class="card">
    <h2>📈 Highest Put OI</h2>
    <p id="putoi">Coming Soon</p>
</div>

<div class="card">
    <h2>⚖️ PCR</h2>
    <p id="pcr">Coming Soon</p>
</div>

<div class="card">
    <h2>🎯 ATM Strike</h2>
    <p id="atm">Coming Soon</p>
</div>

<div class="card">
    <h2>🕒 Last Updated</h2>
    <p id="lastUpdated">--</p>
</div>

</div>

<!-- TradingView Chart -->
<div class="tradingview-widget-container">
    <div id="tradingview_chart"></div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
    "width": "100%",
    "height": 550,
    "symbol": "NSE:NIFTY",
    "interval": "5",
    "timezone": "Asia/Kolkata",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "toolbar_bg": "#111827",
    "enable_publishing": false,
    "hide_top_toolbar": false,
    "allow_symbol_change": true,
    "container_id": "tradingview_chart"
});
</script>

<script src="script.js"></script>

</body>
</html>
